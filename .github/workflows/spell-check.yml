on:
  pull_request:
  push:
    branches: [main]
permissions: {}
jobs:
  spell-check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - run: npx cspell@6 "**/*"
